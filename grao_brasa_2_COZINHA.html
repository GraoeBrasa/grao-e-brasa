<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Cozinha – Grão & Brasa</title>
<style>
    body{font-family:sans-serif;background:#111;color:#eee;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
    .card{background:#222;padding:20px;border-radius:15px;border-left:8px solid #f39c12}
    .btn{width:100%;padding:15px;border:none;border-radius:10px;font-weight:bold;margin-top:15px;cursor:pointer;color:white}
</style>
</head>
<body>
<h1>👨‍🍳 Cozinha Brasa</h1>
<div class="grid" id="grid"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
const db = getDatabase(initializeApp({ databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com" }));
onValue(ref(db, 'pedidos'), (snap) => {
    const g = document.getElementById('grid'); g.innerHTML = '';
    const d = snap.val(); if(!d) return;
    Object.keys(d).forEach(k => {
        const p = d[k]; if(p.status==='novo'||p.status==='preparando'){
            g.innerHTML += `<div class="card" style="border-color:${p.status==='novo'?'#f39c12':'#3498db'}"><b>${p.mesa}</b><div style="margin:10px 0">${p.itens.map(i=>`• ${i.nome}<br>`).join('')}</div><small>${p.obs||''}</small><button class="btn" style="background:${p.status==='novo'?'#c8843a':'#27ae60'}" onclick="upd('${k}','${p.status==='novo'?'preparando':'pronto'}')">${p.status==='novo'?'INICIAR':'PRONTO'}</button></div>`;
        }
    });
});
window.upd = (id, s) => update(ref(db, 'pedidos/'+id), {status: s});
</script>
</body>
</html>
