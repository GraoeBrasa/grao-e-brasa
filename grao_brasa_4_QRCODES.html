<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>QR Mesas – Grão & Brasa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    body{font-family:serif;text-align:center;background:#f5ead6;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:25px}
    .card{background:white;border:2px solid #c8843a;padding:20px;border-radius:15px;display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
<h1>QR Codes Mesas</h1>
<div class="grid" id="grid"></div>
<script>
    const URL = "https://graoebrasa.github.io/grao-e-brasa/grao_brasa_1_CLIENTE.html";
    for(let i=1; i<=12; i++){
        const c = document.createElement('div'); c.className = 'card';
        const u = URL + "?mesa=Mesa_" + i;
        c.innerHTML = `<h3>MESA ${i}</h3><div id="q${i}"></div><div style="font-size:0.5rem;margin-top:10px">${u}</div>`;
        document.getElementById('grid').appendChild(c);
        new QRCode(document.getElementById('q'+i), {text: u, width: 150, height: 150});
    }
</script>
</body>
</html>
