<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Codes – Grão & Brasa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Lora', serif; background: #f5ead6; color: #3d1f0d; text-align: center; padding: 20px; }
    h1 { font-family: 'Playfair Display', serif; margin-bottom: 5px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; max-width: 1000px; margin: 30px auto; }
    .card { background: white; border: 2px solid #c8843a; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; }
    .card h3 { font-family: 'Playfair Display', serif; margin-bottom: 10px; color: #c8843a; }
    .footer-text { font-size: 0.55rem; color: #888; margin-top: 15px; word-break: break-all; }
    .btn-print { padding: 12px 25px; background: #3d1f0d; color: #d4a84b; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    @media print { .no-print { display: none; } body { background: white; } .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; } }
</style>
</head>
<body>

    <div class="no-print">
        <h1>Gerador de QR Codes</h1>
        <p>Grão & Brasa – Betim/MG</p>
        <button class="btn-print" onclick="window.print()">🖨️ Imprimir para as Mesas</button>
    </div>

    <div class="grid" id="grid">
        <div class="card" style="border-color: #e74c3c;">
            <h3 style="color: #e74c3c;">🛵 DELIVERY</h3>
            <div id="q-del"></div>
            <div class="footer-text">Peça pelo celular</div>
        </div>
    </div>

<script>
    // SEU NOVO LINK OFICIAL
    const URL_BASE = "https://graoebrasa.github.io/grao-e-brasa/grao_brasa_1_CLIENTE.html";
    
    // QR Delivery
    new QRCode(document.getElementById('q-del'), { text: URL_BASE + "?mesa=Delivery", width: 160, height: 160 });

    // QR das 12 Mesas
    for(let i=1; i<=12; i++){
        const card = document.createElement('div');
        card.className = 'card';
        const urlMesa = URL_BASE + "?mesa=Mesa_" + i;
        card.innerHTML = `<h3>MESA ${i}</h3><div id="q${i}"></div><div class="footer-text">${urlMesa}</div>`;
        document.getElementById('grid').appendChild(card);
        new QRCode(document.getElementById('q'+i), { text: urlMesa, width: 160, height: 160 });
    }
</script>
</body>
</html>
