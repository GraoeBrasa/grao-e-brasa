<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><title>Caixa – Grão & Brasa</title>
<style>
    body{font-family:sans-serif;background:#0f1117;color:#dde;padding:20px}
    .box{background:#161b27;padding:20px;border-radius:12px;text-align:center;margin-bottom:20px}
    .btn{padding:12px 20px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:white;margin:5px}
    .card{background:#161b27;padding:15px;border-radius:10px;margin-bottom:10px;border-left:5px solid #e74c3c}
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between"><h1>💰 Gestão Brasa</h1><h2 id="st">--</h2></div>
<button class="btn" style="background:#27ae60" onclick="set(true)">🔓 ABRIR LOJA</button>
<button class="btn" style="background:#e74c3c" onclick="set(false)">🔒 FECHAR LOJA</button>
<div class="box"><h3>TOTAL VENDAS: <span id="tot" style="color:#27ae60">R$ 0,00</span></h3></div>
<h3>⏳ Pagamentos Pendentes</h3>
<div id="lista"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update, set as fbSet } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
const db = getDatabase(initializeApp({ databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com" }));
onValue(ref(db, 'configuracoes/caixa'), s => document.getElementById('st').innerText = s.val()?.aberto ? "🟢 ABERTO" : "🔴 FECHADO");
window.set = (v) => fbSet(ref(db, 'configuracoes/caixa'), {aberto: v});
onValue(ref(db, 'pedidos'), (snap) => {
    const l = document.getElementById('lista'); l.innerHTML = ''; let t = 0;
    const d = snap.val(); if(!d) return;
    Object.keys(d).forEach(k => {
        const p = d[k]; if(p.status === 'aguardando_pagamento') {
            l.innerHTML += `<div class="card"><b>${p.mesa} - R$ ${p.total.toFixed(2)}</b><br><small>${p.cliente} | ${p.metodoPag}</small><button class="btn" style="background:#27ae60;width:100%" onclick="upd('${k}','novo')">Confirmar</button></div>`;
        } else if(p.status !== 'cancelado') t += p.total;
    });
    document.getElementById('tot').innerText = "R$ " + t.toFixed(2);
});
window.upd = (id, s) => update(ref(db, 'pedidos/'+id), {status: s});
</script>
</body>
</html>
