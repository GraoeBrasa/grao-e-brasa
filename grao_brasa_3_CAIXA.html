<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Grão & Brasa – Painel de Controle</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --bg: #0f1117; --card: #161b27; --brd: #2a3045; --dou: #d4a84b; --car: #c8843a; --vd: #27ae60; --vm: #e74c3c; --az: #3498db; --txt: #dde; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lora', serif; background: var(--bg); color: var(--txt); min-height: 100vh; }
    
    /* NAVEGAÇÃO */
    .topbar { background: var(--card); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brd); }
    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--brd); overflow-x: auto; sticky; top: 0; z-index: 10; }
    .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: #888; font-family: 'Playfair Display'; font-weight: 700; cursor: pointer; transition: 0.3s; white-space: nowrap; }
    .tab-btn.active { color: var(--dou); border-bottom: 3px solid var(--car); background: rgba(200, 132, 58, 0.1); }

    /* CONTEÚDO */
    .content { padding: 25px; max-width: 1200px; margin: 0 auto; display: none; }
    .content.active { display: block; }

    /* CARDS E GRIDS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--brd); text-align: center; }
    .stat-card h4 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
    .stat-card h2 { font-size: 1.8rem; color: var(--vd); }

    .box { background: var(--card); border-radius: 16px; border: 1px solid var(--brd); padding: 20px; margin-bottom: 20px; }
    
    /* TABELAS E PEDIDOS */
    .order-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--az); display: flex; justify-content: space-between; align-items: center; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
    .btn-vd { background: var(--vd); }
    .btn-vm { background: var(--vm); }
    .btn-az { background: var(--az); }

    /* GRÁFICOS */
    .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }
</style>
</head>
<body>

<div class="topbar">
    <div style="font-family:'Playfair Display'; font-size:1.5rem; color:var(--dou)">Grão & Brasa <span style="font-size: 0.8rem; opacity: 0.6">| GESTÃO</span></div>
    <div id="status-loja" style="font-weight: bold; padding: 5px 15px; border-radius: 20px;">--</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab('t-caixa', this)">💰 CAIXA</button>
    <button class="tab-btn" onclick="openTab('t-pedidos', this)">📑 PEDIDOS</button>
    <button class="tab-btn" onclick="openTab('t-graficos', this)">📊 GRÁFICOS</button>
    <button class="tab-btn" onclick="openTab('t-hist', this)">📜 HISTÓRICO</button>
</div>

<div id="t-caixa" class="content active">
    <div class="stats-grid">
        <div class="stat-card"><h4>PIX</h4><h2 id="val-pix">R$ 0,00</h2></div>
        <div class="stat-card"><h4>Cartão</h4><h2 id="val-cartao">R$ 0,00</h2></div>
        <div class="stat-card"><h4>Dinheiro</h4><h2 id="val-dinheiro">R$ 0,00</h2></div>
        <div class="stat-card" style="border-color: var(--vd)"><h4>Total do Turno</h4><h2 id="val-total" style="color: var(--vd)">R$ 0,00</h2></div>
    </div>

    <div class="box" style="text-align: center;">
        <h3 style="margin-bottom: 20px; font-family: 'Playfair Display'">Controle de Turno</h3>
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn-vd" style="padding: 15px 40px" onclick="toggleCaixa(true)">🔓 ABRIR CAIXA</button>
            <button class="btn btn-vm" style="padding: 15px 40px" onclick="confirmarFechamento()">🔒 FECHAR CAIXA</button>
        </div>
        <p id="info-abertura" style="margin-top: 15px; font-size: 0.8rem; color: #888;"></p>
    </div>
</div>

<div id="t-pedidos" class="content">
    <div class="box">
        <h3 style="margin-bottom: 15px;">💳 Aguardando Pagamento</h3>
        <div id="lista-pendentes"></div>
    </div>
    <div class="box">
        <h3 style="margin-bottom: 15px; color: var(--az)">🔥 Em Preparo / Rota</h3>
        <div id="lista-ativos"></div>
    </div>
</div>

<div id="t-graficos" class="content">
    <div class="stats-grid">
        <div class="box" style="grid-column: span 2;">
            <h4>Vendas por Hora</h4>
            <div class="chart-container"><canvas id="chartVendas"></canvas></div>
        </div>
        <div class="box">
            <h4>Métodos de Pagamento</h4>
            <div class="chart-container"><canvas id="chartPagamento"></canvas></div>
        </div>
    </div>
</div>

<div id="t-hist" class="content">
    <div class="box">
        <h3 style="margin-bottom: 15px">Fechamentos Anteriores</h3>
        <div id="lista-historico"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const config = { databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com" };
const db = getDatabase(initializeApp(config));

let stats = { Pix: 0, Cartao: 0, Dinheiro: 0, total: 0 };
let pedidosAtivosCount = 0;
let caixaStatus = { aberto: false, inicio: null };
let chartV, chartP;

// CONTROLE DE ABAS
window.openTab = (tabId, btn) => {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
    if(tabId === 't-graficos') initCharts();
};

// STATUS DO CAIXA
onValue(ref(db, 'configuracoes/caixa'), (snap) => {
    caixaStatus = snap.val() || { aberto: false };
    const el = document.getElementById('status-loja');
    el.innerText = caixaStatus.aberto ? "🟢 ABERTO" : "🔴 FECHADO";
    el.style.background = caixaStatus.aberto ? "rgba(39,174,96,0.2)" : "rgba(231,76,60,0.2)";
    document.getElementById('info-abertura').innerText = caixaStatus.inicio ? "Turno iniciado em: " + new Date(caixaStatus.inicio).toLocaleString() : "";
});

window.toggleCaixa = (abrir) => {
    if(abrir && caixaStatus.aberto) return alert("O caixa já está aberto!");
    set(ref(db, 'configuracoes/caixa'), { 
        aberto: abrir, 
        inicio: abrir ? new Date().toISOString() : null 
    });
    if(abrir) alert("Turno iniciado!");
};

window.confirmarFechamento = async () => {
    if(!caixaStatus.aberto) return alert("O caixa já está fechado!");
    if(pedidosAtivosCount > 0) return alert("Existem " + pedidosAtivosCount + " pedidos pendentes. Finalize tudo antes de fechar!");
    
    if(confirm("Deseja fechar o caixa e salvar o relatório de R$ " + stats.total.toFixed(2) + "?")) {
        const fechamento = {
            data: new Date().toISOString(),
            total: stats.total,
            detalhes: stats,
            periodo: { inicio: caixaStatus.inicio, fim: new Date().toISOString() }
        };
        await push(ref(db, 'fechamentos'), fechamento);
        toggleCaixa(false);
        alert("Caixa fechado e histórico salvo!");
    }
};

// MONITOR DE PEDIDOS E CÁLCULO DE TOTAIS
onValue(ref(db, 'pedidos'), (snap) => {
    const dados = snap.val();
    const pendentesArea = document.getElementById('lista-pendentes');
    const ativosArea = document.getElementById('lista-ativos');
    
    pendentesArea.innerHTML = "";
    ativosArea.innerHTML = "";
    
    // Reset stats para o turno atual
    stats = { Pix: 0, Cartao: 0, Dinheiro: 0, total: 0 };
    pedidosAtivosCount = 0;
    let hourlyData = Array(24).fill(0);

    if(dados) {
        Object.keys(dados).forEach(key => {
            const p = dados[key];
            const isDesteTurno = caixaStatus.inicio && p.hora >= caixaStatus.inicio;

            // Lógica de Exibição
            if(p.status === 'aguardando_pagamento') {
                pendentesArea.innerHTML += createOrderCard(key, p, true);
            } else if(['novo', 'preparando', 'pronto', 'em_rota'].includes(p.status)) {
                ativosArea.innerHTML += createOrderCard(key, p, false);
                pedidosAtivosCount++;
            }

            // Lógica Financeira (apenas pedidos deste turno e que não foram cancelados)
            if(isDesteTurno && p.status !== 'cancelado' && p.status !== 'aguardando_pagamento') {
                stats.total += p.total;
                stats[p.metodoPag] = (stats[p.metodoPag] || 0) + p.total;
                const hora = new Date(p.hora).getHours();
                hourlyData[hora] += p.total;
            }
        });
    }

    // Atualiza Interface
    document.getElementById('val-pix').innerText = "R$ " + stats.Pix.toFixed(2);
    document.getElementById('val-cartao').innerText = "R$ " + stats.Cartao.toFixed(2);
    document.getElementById('val-dinheiro').innerText = "R$ " + stats.Dinheiro.toFixed(2);
    document.getElementById('val-total').innerText = "R$ " + stats.total.toFixed(2);
    
    if(chartV) updateCharts(hourlyData);
});

function createOrderCard(id, p, isPendente) {
    const itensNomes = p.itens.map(i => i.nome).join(', ');
    return `
        <div class="order-item" style="border-left-color: ${isPendente ? 'var(--vm)' : 'var(--az)'}">
            <div>
                <b>${p.mesa} - ${p.cliente}</b><br>
                <small>${itensNomes}</small><br>
                <small style="color:var(--dou)">${p.metodoPag} | R$ ${p.total.toFixed(2)}</small>
            </div>
            <div>
                ${isPendente ? 
                    `<button class="btn btn-vd" onclick="mudarStatus('${id}', 'novo')">PAGO</button>` : 
                    `<button class="btn btn-az" onclick="mudarStatus('${id}', 'finalizado')">FINALIZAR</button>`
                }
            </div>
        </div>`;
}

window.mudarStatus = (id, novoStatus) => update(ref(db, 'pedidos/' + id), { status: novoStatus });

// HISTÓRICO
onValue(ref(db, 'fechamentos'), (snap) => {
    const histArea = document.getElementById('lista-historico');
    histArea.innerHTML = "";
    const dados = snap.val();
    if(dados) {
        Object.values(dados).reverse().forEach(f => {
            histArea.innerHTML += `
                <div style="padding:10px; border-bottom:1px solid var(--brd); display:flex; justify-content:space-between">
                    <span>📅 ${new Date(f.data).toLocaleDateString()}</span>
                    <b style="color:var(--vd)">R$ ${f.total.toFixed(2)}</b>
                </div>`;
        });
    }
});

// GRÁFICOS
function initCharts() {
    const ctxV = document.getElementById('chartVendas').getContext('2d');
    const ctxP = document.getElementById('chartPagamento').getContext('2d');

    if(chartV) { chartV.destroy(); chartP.destroy(); }

    chartV = new Chart(ctxV, {
        type: 'line',
        data: { labels: Array.from({length: 24}, (_, i) => i + "h"), datasets: [{ label: 'R$', data: [], borderColor: '#c8843a', tension: 0.3, fill: true, backgroundColor: 'rgba(200, 132, 58, 0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });

    chartP = new Chart(ctxP, {
        type: 'doughnut',
        data: { labels: ['Pix', 'Cartão', 'Dinheiro'], datasets: [{ data: [0,0,0], backgroundColor: ['#3498db', '#9b59b6', '#27ae60'], borderWeight: 0 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function updateCharts(hourlyData) {
    chartV.data.datasets[0].data = hourlyData;
    chartP.data.datasets[0].data = [stats.Pix, stats.Cartao, stats.Dinheiro];
    chartV.update();
    chartP.update();
}
</script>
</body>
</html>
