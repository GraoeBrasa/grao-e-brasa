<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Grão & Brasa – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root { --bg: #0f1117; --card: #161b27; --brd: #2a3045; --dou: #d4a84b; --car: #c8843a; --vd: #27ae60; --vm: #e74c3c; --az: #3498db; --txt: #dde; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lora', serif; background: var(--bg); color: var(--txt); min-height: 100vh; }
    
    .topbar { background: var(--card); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brd); }
    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--brd); overflow-x: auto; position: sticky; top: 0; z-index: 10; }
    .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: #888; font-family: 'Playfair Display'; font-weight: 700; cursor: pointer; transition: 0.3s; white-space: nowrap; }
    .tab-btn.active { color: var(--dou); border-bottom: 3px solid var(--car); background: rgba(200, 132, 58, 0.1); }

    .content { padding: 25px; max-width: 1200px; margin: 0 auto; display: none; }
    .content.active { display: block; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--brd); text-align: center; }
    .stat-card h2 { font-size: 1.8rem; color: var(--vd); }

    .box { background: var(--card); border-radius: 16px; border: 1px solid var(--brd); padding: 20px; margin-bottom: 20px; }
    
    .order-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--az); display: flex; justify-content: space-between; align-items: center; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; margin: 5px; }
    .btn-vd { background: var(--vd); }
    .btn-vm { background: var(--vm); }
    .btn-dou { background: var(--m); border: 1px solid var(--dou); color: var(--dou); }

    .hist-item { padding: 15px; border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; }
    .hist-actions button { background: none; border: none; color: var(--dou); cursor: pointer; margin-left: 15px; font-size: 0.8rem; text-decoration: underline; }

    .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }

    @media print { .no-print { display: none !important; } .content { display: block !important; background: white; color: black; } body { background: white; } .box { border: 1px solid #ccc; } .hist-actions { display: none; } }
</style>
</head>
<body>

<div class="topbar no-print">
    <div style="font-family:'Playfair Display'; font-size:1.5rem; color:var(--dou)">Grão & Brasa <span style="font-size: 0.8rem; opacity: 0.6">| ADMIN</span></div>
    <div id="status-loja" style="font-weight: bold; padding: 5px 15px; border-radius: 20px;">--</div>
</div>

<div class="tabs no-print">
    <button class="tab-btn active" onclick="openTab('t-caixa', this)">💰 CAIXA</button>
    <button class="tab-btn" onclick="openTab('t-pedidos', this)">📑 PEDIDOS</button>
    <button class="tab-btn" onclick="openTab('t-graficos', this)">📊 MÉTRICAS</button>
    <button class="tab-btn" onclick="openTab('t-hist', this)">📜 HISTÓRICO</button>
</div>

<div id="t-caixa" class="content active">
    <div class="stats-grid">
        <div class="stat-card"><h4>PIX</h4><h2 id="val-pix">R$ 0,00</h2></div>
        <div class="stat-card"><h4>Cartão</h4><h2 id="val-cartao">R$ 0,00</h2></div>
        <div class="stat-card"><h4>Dinheiro</h4><h2 id="val-dinheiro">R$ 0,00</h2></div>
        <div class="stat-card" style="border-color: var(--vd)"><h4>Turno Atual</h4><h2 id="val-total" style="color: var(--vd)">R$ 0,00</h2></div>
    </div>
    <div class="box no-print" style="text-align: center;">
        <button class="btn btn-vd" onclick="toggleCaixa(true)">🔓 ABRIR TURNO</button>
        <button class="btn btn-vm" onclick="confirmarFechamento()">🔒 FECHAR TURNO</button>
    </div>
</div>

<div id="t-hist" class="content">
    <div class="box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="font-family: 'Playfair Display'">Registros Mensais</h3>
            <div class="no-print">
                <button class="btn btn-dou" onclick="exportarCSV()">📊 EXPORTAR EXCEL</button>
                <button class="btn btn-dou" onclick="window.print()">🖨️ IMPRIMIR PDF</button>
            </div>
        </div>
        <div id="lista-historico"></div>
    </div>
</div>

<div id="t-pedidos" class="content"><div class="box"><div id="lista-pendentes"></div></div><div class="box"><div id="lista-ativos"></div></div></div>
<div id="t-graficos" class="content"><div class="stats-grid"><div class="box" style="grid-column: span 2;"><canvas id="chartVendas"></canvas></div><div class="box"><canvas id="chartPagamento"></canvas></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update, set, push, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const db = getDatabase(initializeApp({ databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com" }));

let stats = { Pix: 0, Cartao: 0, Dinheiro: 0, total: 0 };
let pedidosAtivosCount = 0;
let caixaStatus = { aberto: false, inicio: null };

window.openTab = (tabId, btn) => {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
};

// LÓGICA DE EXPORTAÇÃO CSV
window.exportarCSV = () => {
    onValue(ref(db, 'fechamentos'), (snap) => {
        const dados = snap.val();
        if(!dados) return alert("Sem dados para exportar.");
        
        let csv = "Data;Total;Pix;Cartao;Dinheiro\n"; // Ponto e vírgula para Excel PT-BR
        Object.values(dados).reverse().forEach(f => {
            csv += `${new Date(f.data).toLocaleDateString()};${f.total.toFixed(2)};${(f.detalhes?.Pix || 0).toFixed(2)};${(f.detalhes?.Cartao || 0).toFixed(2)};${(f.detalhes?.Dinheiro || 0).toFixed(2)}\n`;
        });

        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `fechamentos_grao_brasa_${new Date().getMonth()+1}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }, { onlyOnce: true });
};

// ... (Restante das funções: toggleCaixa, confirmarFechamento, onValue Pedidos, mudarStatus, onValue Histórico, editHist, delHist)
// Mantenha as funções que já criamos para edição e exclusão.

onValue(ref(db, 'configuracoes/caixa'), s => { caixaStatus = s.val() || {aberto:false}; document.getElementById('status-loja').innerText = caixaStatus.aberto ? "🟢 ABERTO" : "🔴 FECHADO"; });

onValue(ref(db, 'pedidos'), snap => {
    const dados = snap.val();
    stats = { Pix: 0, Cartao: 0, Dinheiro: 0, total: 0 };
    if(dados) Object.values(dados).forEach(p => {
        if(caixaStatus.inicio && p.hora >= caixaStatus.inicio && p.status !== 'cancelado' && p.status !== 'aguardando_pagamento') {
            stats.total += p.total; stats[p.metodoPag] = (stats[p.metodoPag] || 0) + p.total;
        }
    });
    document.getElementById('val-pix').innerText = "R$ " + (stats.Pix || 0).toFixed(2);
    document.getElementById('val-cartao').innerText = "R$ " + (stats.Cartao || 0).toFixed(2);
    document.getElementById('val-dinheiro').innerText = "R$ " + (stats.Dinheiro || 0).toFixed(2);
    document.getElementById('val-total').innerText = "R$ " + stats.total.toFixed(2);
});

onValue(ref(db, 'fechamentos'), snap => {
    const list = document.getElementById('lista-historico'); list.innerHTML = "";
    const dados = snap.val();
    if(dados) Object.keys(dados).reverse().forEach(key => {
        const f = dados[key];
        list.innerHTML += `<div class="hist-item"><span>📅 ${new Date(f.data).toLocaleDateString()} - <b>R$ ${f.total.toFixed(2)}</b></span><div class="hist-actions no-print"><button onclick="editHist('${key}', ${f.total})">Editar</button><button style="color:var(--vm)" onclick="delHist('${key}')">Excluir</button></div></div>`;
    });
});

window.editHist = (id, old) => {
    const v = prompt("Novo valor total:", old);
    if(v !== null) update(ref(db, 'fechamentos/'+id), { total: parseFloat(v) });
};
window.delHist = (id) => { if(confirm("Apagar registro?")) remove(ref(db, 'fechamentos/'+id)); };
window.toggleCaixa = (v) => set(ref(db, 'configuracoes/caixa'), { aberto: v, inicio: v ? new Date().toISOString() : null });
window.confirmarFechamento = () => { push(ref(db, 'fechamentos'), { data: new Date().toISOString(), total: stats.total, detalhes: stats }); toggleCaixa(false); };
</script>
</body>
</html>
